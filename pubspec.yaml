name: hermes_mobile
description: Hermes Agent Mobile — Remote control for your AI coding agent
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  web_socket_channel: ^3.0.3
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # Local storage
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  sqflite: ^2.3.0

  # UI
  flutter_markdown: ^0.7.3+1
  google_fonts: ^6.2.1
  diff_match_patch: ^0.4.1

  # Voice
  speech_to_text: ^7.4.0
  permission_handler: ^11.3.1

  # QR Code scanning
  mobile_scanner: ^6.0.2

  # Network discovery
  nsd: ^3.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
